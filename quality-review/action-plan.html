<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>補正行動計畫｜iCAP 品質審查輔導系統</title>
<style>
:root {
  --bg: #0c1222; --sidebar: #151d33; --card: #fff; --text: #1e293b;
  --muted: #64748b; --border: #e2e8f0; --accent: #7c3aed;
  --red: #b91c1c; --blue: #1d4ed8; --green: #15803d;
  --pass: #16a34a; --warn: #ca8a04; --fail: #dc2626;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: "PingFang TC", "Noto Sans TC", sans-serif; background: #eef2ff; color: var(--text); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 250px; background: var(--sidebar); color: #e2e8f0; padding: 1rem 0; flex-shrink: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar .brand { font-size: 1rem; color: #fff; padding: 0 1.25rem 1rem; border-bottom: 1px solid #334155; margin-bottom: 0.5rem; line-height: 1.45; }
.sidebar nav a { display: block; padding: 0.5rem 1.25rem; color: #cbd5e1; text-decoration: none; font-size: 0.88rem; border-left: 3px solid transparent; }
.sidebar nav a:hover, .sidebar nav a.active { background: #1e293b; color: #fff; border-left-color: var(--accent); }
.main { flex: 1; padding: 1.25rem 1.75rem 3rem; max-width: 1200px; }
h2 { margin-top: 0; font-size: 1.45rem; }
h3 { font-size: 1.1rem; margin-top: 1.5rem; }
.card { background: var(--card); border-radius: 12px; padding: 1.15rem 1.35rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.65rem; margin: 1rem 0; }
.stat { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem; text-align: center; }
.stat .v { font-size: 1.6rem; font-weight: 800; }
.stat .l { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }
.stat.pass .v { color: var(--pass); }
.stat.warn .v { color: var(--warn); }
.stat.fail .v { color: var(--fail); }
table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
th, td { border: 1px solid var(--border); padding: 0.45rem 0.6rem; text-align: left; vertical-align: top; }
th { background: #f1f5f9; }
.badge { display: inline-block; padding: 0.12rem 0.45rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; color: #fff; }
.badge-critical { background: var(--fail); }
.badge-aspect { background: #6366f1; }
.badge-red { background: var(--red); }
.badge-blue { background: var(--blue); }
.badge-green { background: var(--green); }
.score-input { width: 3.5rem; padding: 0.25rem; text-align: center; border: 1px solid var(--border); border-radius: 6px; }
textarea.note { width: 100%; min-height: 56px; padding: 0.5rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.85rem; }
.btn { padding: 0.45rem 0.95rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin-right: 0.4rem; margin-top: 0.35rem; }
.btn:hover { opacity: 0.92; }
.btn-outline { background: #fff; color: var(--accent); border: 1px solid var(--accent); }
.callout { border-left: 4px solid var(--accent); background: #f5f3ff; padding: 0.75rem 1rem; margin: 1rem 0; font-size: 0.9rem; }
.callout-red { border-color: var(--red); background: #fef2f2; }
.callout-blue { border-color: var(--blue); background: #eff6ff; }
.callout-green { border-color: var(--green); background: #f0fdf4; }
.meter { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin: 0.35rem 0; }
.meter > span { display: block; height: 100%; background: linear-gradient(90deg, #7c3aed, #2563eb); border-radius: 999px; transition: width .3s; }
.captain-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
.captain-card { border-radius: 10px; padding: 1rem; color: #fff; }
.captain-card h4 { margin: 0 0 0.5rem; }
.captain-card ul { margin: 0; padding-left: 1.1rem; font-size: 0.85rem; line-height: 1.5; }
.filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
.filters input, .filters select { padding: 0.35rem 0.55rem; border: 1px solid var(--border); border-radius: 6px; }
.doc-row { font-size: 0.82rem; }
.report-body { font-size: 0.88rem; line-height: 1.65; }
.report-body h4 { margin: 0.85rem 0 0.35rem; font-size: 0.95rem; }
.report-body ul, .report-body ol { margin: 0.35rem 0; padding-left: 1.25rem; }
.report-body p { margin: 0.35rem 0; }
.report-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.5rem; }
footer.page-foot { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.78rem; color: var(--muted); }
@media (max-width: 768px) { .layout { flex-direction: column; } .sidebar { width: 100%; height: auto; position: static; } }
</style>
</head>
